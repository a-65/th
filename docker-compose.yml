version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: th-postgres
    environment:
      POSTGRES_USER: th_user
      POSTGRES_PASSWORD: th_password
      POSTGRES_DB: thdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U th_user -d thdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: th-server
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: th_user
      DB_PASSWORD: th_password
      DB_NAME: thdb
      STATIC_PATH: /root/client
    volumes:
      - ./client:/root/client
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: