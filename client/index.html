<!DOCTYPE html>
<!-- Указываем тип документа HTML5 для корректной интерпретации браузером -->
<html lang="ru">
<!-- Открывающий тег html с атрибутом lang="ru" для указания языка содержимого -->
<head>
    <!-- Служебная информация о странице, не отображаемая напрямую -->
    <meta charset="UTF-8">
    <!-- Указываем кодировку UTF-8 для поддержки всех символов, включая кириллицу и эмодзи -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Настройки адаптивности для мобильных устройств: ширина равна ширине экрана, начальный масштаб 1.0 -->
    <title>TarotHub</title>
    <!-- Заголовок страницы, отображаемый во вкладке браузера -->
    <style>
        /* Подключаем благородный шрифт Cinzel из Google Fonts для создания атмосферы старины */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        /* Основные стили для body - фон стола и общая атмосфера */
        body {
            /* Устанавливаем благородный шрифт с засечками, имитирующий старинные рукописи */
            font-family: 'Cinzel', 'Times New Roman', serif;
            /* Ограничиваем максимальную ширину контента для удобства чтения */
            max-width: 800px;
            /* Центрируем контент по горизонтали с отступом сверху 50px */
            margin: 50px auto;
            /* Внутренние отступы, чтобы контент не прилипал к краям */
            padding: 20px;
            /* Цвет потемневшего дуба - создает эффект старого деревянного стола */
            background: #2D1E19;
            /* Потертое золото для основного текста - благородный, приглушенный оттенок */
            color: #C89637;
            /* Выравниваем весь текст по центру */
            text-align: center;
            /* Позволяет позиционировать псевдоэлемент ::before относительно body */
            position: relative;
            /* Внутренняя тень создает эффект затемнения по краям - глубину комнаты */
            box-shadow: inset 0 0 100px #140C0A;
            /* Добавляем плавный переход для смены цвета фона */
            transition: background-color 0.5s ease;
        }
        
        /* Псевдоэлемент для создания эффекта свечения свечи */
        body::before {
            /* Обязательное свойство для отображения псевдоэлемента */
            content: "";
            /* Фиксированное позиционирование относительно окна браузера */
            position: fixed;
            /* Прижимаем к верхнему левому углу */
            top: 0;
            left: 0;
            /* Растягиваем на всю ширину и высоту окна */
            width: 100%;
            height: 100%;
            /* Создаем радиальный градиент - пятно света от свечи */
            background: radial-gradient(
                circle at 30% 40%,  /* Центр свечения в левой верхней части экрана */
                rgba(240, 170, 90, 0.1) 0%,  /* Полупрозрачный теплый свет в центре */
                transparent 70%  /* Полная прозрачность к краям */
            );
            /* Элемент не должен перехватывать клики мыши */
            pointer-events: none;
            /* Применяем анимацию мерцания свечи */
            animation: candle-flicker 3s infinite;
        }
        
        /* Стили для счетчика посещений - добавляем новую карточку для статистики */
        .visit-counter {
            /* Цвет пожелтевшего пергамента как у карт */
            background: #E6D2AA;
            /* Закругленные углы */
            border-radius: 30px;
            /* Внутренние отступы */
            padding: 10px 20px;
            /* Рамка золотого тиснения */
            border: 1px solid #C89637;
            /* Цвет текста темно-коричневый */
            color: #41281E;
            /* Отображаем как инлайн-блок для центрирования */
            display: inline-block;
            /* Отступ сверху */
            margin-top: 15px;
            /* Шрифт чуть меньше основного */
            font-size: 0.9em;
            /* Тень для глубины */
            box-shadow: 0 2px 5px #140C0A;
            /* Позиционирование относительно свечения */
            position: relative;
            /* Индекс наложения, чтобы быть выше фоновых эффектов */
            z-index: 1;
        }
        
        /* Стили для числа посещений - делаем его более заметным */
        .visit-number {
            /* Золотой цвет для выделения */
            color: #C89637;
            /* Жирное начертание */
            font-weight: bold;
            /* Немного увеличиваем размер */
            font-size: 1.2em;
            /* Отступ слева для отделения от текста */
            margin-left: 5px;
            /* Добавляем легкое свечение */
            text-shadow: 0 0 5px rgba(240, 170, 90, 0.3);
        }
        
        /* Стили для карты - основной элемент интерфейса */
        .card {
            /* Цвет пожелтевшего пергамента - фон лицевой стороны карты */
            background: #E6D2AA;
            /* Закругленные углы для смягчения внешнего вида */
            border-radius: 12px;
            /* Внутренние отступы для контента внутри карты */
            padding: 25px;
            /* Отступ сверху для отделения карт друг от друга */
            margin-top: 20px;
            /* Рамка золотого тиснения вокруг карты */
            border: 2px solid #C89637;
            /* Две тени: внешняя глубокая тень и внутренняя тонкая рамка из бронзы */
            box-shadow: 0 10px 25px #140C0A, 0 0 0 1px #A0783C inset;
            /* Темно-коричневый текст для контраста на светлом фоне карты */
            color: #41281E;
            /* Для позиционирования внутренних элементов */
            position: relative;
            /* Плавный переход для всех анимируемых свойств */
            transition: all 0.3s ease;
        }
        
        /* Эффект при наведении на карту */
        .card:hover {
            /* Увеличиваем тень и меняем внутреннюю рамку на цвет свечи */
            box-shadow: 0 15px 30px #140C0A, 0 0 0 2px #F0AA5A inset;
            /* Приподнимаем карту вверх на 5 пикселей */
            transform: translateY(-5px);
        }
        
        /* Стили для символов/рисунков на картах (масти, эмодзи) */
        .card-symbol {
            /* Цвет темной киновари - как старинная красная краска */
            color: #782319;
            /* Увеличенный размер шрифта для символов */
            font-size: 3em;
            /* Отступ снизу для отделения от текста */
            margin-bottom: 10px;
        }
        
        /* Стили для главного заголовка - делаем его кликабельным */
        h1 {
            /* Крупный размер шрифта для заголовка */
            font-size: 3em;
            /* Убираем стандартный отступ снизу */
            margin-bottom: 0;
            /* Текстовая тень с цветом свечи для эффекта свечения */
            text-shadow: 0 0 10px rgba(240, 170, 90, 0.5);
            /* Увеличиваем расстояние между буквами для благородного вида */
            letter-spacing: 2px;
            /* Меняем курсор на указатель, показывая что элемент кликабельный */
            cursor: pointer;
            /* Добавляем плавный переход для эффекта при наведении */
            transition: all 0.3s ease;
            /* Делаем заголовок чуть ярче при наведении */
            &:hover {
                text-shadow: 0 0 15px rgba(240, 170, 90, 0.8);
                transform: scale(1.02);
            }
        }
        
        /* Стили для обычного текста */
        p {
            /* Размер шрифта для комфортного чтения */
            font-size: 1.2em;
            /* Межстрочный интервал для улучшения читаемости */
            line-height: 1.6;
            /* Тусклое золото для второстепенного текста */
            color: #A0783C;
        }
        
        /* Отдельные стили для параграфов внутри карт */
        .card p {
            /* Переопределяем цвет на темно-коричневый для контраста */
            color: #41281E;
        }
        
        /* Стили для кнопок в стиле старой бронзы */
        .button {
            /* Прозрачный фон, чтобы просвечивал фон стола */
            background: transparent;
            /* Рамка цвета потемневшей латуни */
            border: 2px solid #6E5A46;
            /* Цвет текста - тусклое золото */
            color: #A0783C;
            /* Вертикальные и горизонтальные отступы внутри кнопки */
            padding: 12px 30px;
            /* Внешние отступы между кнопками */
            margin: 10px;
            /* Размер текста кнопки */
            font-size: 1.1em;
            /* Курсор в виде указателя при наведении */
            cursor: pointer;
            /* Плавный переход для всех свойств */
            transition: all 0.3s ease;
            /* Сильно закругленные углы для элегантности */
            border-radius: 30px;
            /* Тот же благородный шрифт */
            font-family: 'Cinzel', serif;
        }
        
        /* Эффект при наведении на кнопку */
        .button:hover {
            /* Меняем цвет рамки на цвет свечи */
            border-color: #F0AA5A;
            /* Меняем цвет текста на цвет свечи */
            color: #F0AA5A;
            /* Добавляем внешнее свечение цвета свечи */
            box-shadow: 0 0 20px rgba(240, 170, 90, 0.3);
        }
        
        /* Анимация мерцания свечи */
        @keyframes candle-flicker {
            /* Начало анимации - легкое затемнение */
            0% { opacity: 0.8; }
            /* Пик яркости */
            25% { opacity: 1; }
            /* Затемнение */
            50% { opacity: 0.7; }
            /* Возврат к яркости */
            75% { opacity: 0.9; }
            /* Возврат к исходному состоянию */
            100% { opacity: 0.8; }
        }
        
        /* Стили для рубашки карты (альтернативный вид карты) */
        .card-back {
            /* Фон цвета потертой кожи */
            background: #41281E;
            /* Создаем узор - золотые точки, имитирующие тиснение */
            background-image: radial-gradient(circle at 30% 40%, #C89637 1px, transparent 1px);
            /* Размер узора - расстояние между точками */
            background-size: 20px 20px;
            /* Цвет текста на рубашке - золотой */
            color: #C89637;
        }
        
        /* Стили для горизонтальных разделителей */
        hr {
            /* Убираем стандартную рамку */
            border: none;
            /* Задаем высоту линии */
            height: 1px;
            /* Создаем градиентную линию: прозрачная по краям, бронзовая в центре */
            background: linear-gradient(to right, transparent, #6E5A46, transparent);
            /* Вертикальные отступы вокруг разделителя */
            margin: 30px 0;
        }

        /* Стили для контейнера с информацией о цвете */
        .color-info {
            /* Цвет пожелтевшего пергамента как у карт */
            background: #E6D2AA;
            /* Закругленные углы */
            border-radius: 20px;
            /* Внутренние отступы */
            padding: 8px 15px;
            /* Рамка золотого тиснения */
            border: 1px solid #C89637;
            /* Цвет текста темно-коричневый */
            color: #41281E;
            /* Отображаем как инлайн-блок для центрирования */
            display: inline-block;
            /* Отступ сверху */
            margin-top: 10px;
            /* Шрифт */
            font-size: 0.9em;
            /* Тень для глубины */
            box-shadow: 0 2px 5px #140C0A;
        }

        /* Цветовой индикатор - маленький кружок с текущим цветом */
        .color-indicator {
            /* Создаем круг */
            width: 20px;
            height: 20px;
            border-radius: 50%;
            /* Отображаем в одну строку с текстом */
            display: inline-block;
            /* Вертикальное выравнивание */
            vertical-align: middle;
            /* Отступ справа */
            margin-right: 8px;
            /* Рамка */
            border: 2px solid #C89637;
        }
    </style>
    <!-- Закрывающий тег для стилей -->
</head>
<!-- Закрывающий тег head, открывающий тег body -->

<body>
    <!-- Основное содержимое страницы, отображаемое пользователю -->
    <h1 id="main-title">🔮 TarotHub</h1>
    <!-- Главный заголовок страницы с эмодзи хрустального шара для мистической атмосферы -->
    <!-- Добавили id="main-title" для привязки обработчика клика -->
    
    <p>Добро пожаловать в экосистему таро</p>
    <!-- Подзаголовок с приветствием -->

    <!-- Изображение -->
    <img src="title.jpg" alt="TarotHub Title" style="max-width: 40%; border-radius: 8px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;">
    
    <!-- Контейнер для информации о текущем цвете -->
    <div id="color-info-container" class="color-info">
        <!-- Сюда будет вставлена информация о цвете через JavaScript -->
    </div>
    
    <!-- Контейнер для счетчика посещений - будет заполнен через JavaScript -->
    <div id="visit-counter-container">
        <!-- Сюда будет вставлен счетчик через JavaScript -->
    </div>
    
    <!-- Краткое описание таро-экосистемы -->
    <div class="description">
        <!-- Заголовок второго уровня внутри карты -->
        <p>Пространство для магии</p>
        <!-- Описание проекта -->
    </div>

    <div class="card">
        <!-- Блок-карта для выделения основного контента в стиле карты Таро -->
        <h2>Скоро здесь появится магия</h2>
        <!-- Заголовок второго уровня внутри карты -->
        <p>Мы создаем пространство для тарологов, художников и искателей</p>
        <!-- Описание проекта -->
        <p>✨ Следите за обновлениями ✨</p>
        <!-- Призыв с эмодзи звездочек для привлечения внимания -->
    </div>
    <!-- Закрывающий тег карты -->
    
    <script>
        // Открывающий тег для JavaScript кода
        console.log('TarotHub client loaded!');
        // Вывод в консоль браузера сообщения о загрузке страницы (для отладки)
        
        // ================ ЗАДАНИЕ 2: ИГРА С JAVASCRIPT ================
        // Меняем цвет фона при клике на заголовок с сохранением в localStorage
        
        /**
         * Массив мистических цветов для фона
         * Каждый цвет создает свою атмосферу
         */
        const mysticalColors = [
            { hex: '#2D1E19', name: 'Потемневший дуб' },     // Исходный
            { hex: '#1A2F2A', name: 'Лесной' },              // Глубокий зеленый
            { hex: '#2A1F3D', name: 'Фиолетовый' },          // Магический
            { hex: '#3D2A1F', name: 'Кожаный' },             // Коричневый
            { hex: '#1F3D2A', name: 'Изумрудный' },          // Алхимический
            { hex: '#3D1F2A', name: 'Бордовый' },            // Винный
            { hex: '#2A3D1F', name: 'Оливковый' },           // Травяной
            { hex: '#1F2A3D', name: 'Ночной' }               // Синий
        ];
        
        // Ключ для хранения индекса цвета в localStorage
        const COLOR_STORAGE_KEY = 'tarothub_selected_color_index';
        
        // Получаем ссылку на элемент заголовка по его ID
        const titleElement = document.getElementById('main-title');
        
        // Получаем ссылку на контейнер для информации о цвете
        const colorInfoContainer = document.getElementById('color-info-container');
        
        // Переменная для хранения текущего индекса цвета
        let currentColorIndex = 0;
        
        /**
         * Функция для загрузки сохраненного цвета из localStorage
         * @returns {number} - индекс сохраненного цвета или 0 по умолчанию
         */
        function loadSavedColor() {
            // Пытаемся получить сохраненный индекс из localStorage
            const savedIndex = localStorage.getItem(COLOR_STORAGE_KEY);
            
            if (savedIndex !== null) {
                // Преобразуем строку в число
                const index = parseInt(savedIndex, 10);
                // Проверяем, что индекс в пределах массива
                if (index >= 0 && index < mysticalColors.length) {
                    currentColorIndex = index;
                    console.log(`🎨 Загружен сохраненный цвет: ${mysticalColors[currentColorIndex].name} (индекс: ${currentColorIndex})`);
                }
            }
            
            return currentColorIndex;
        }
        
        /**
         * Функция для сохранения текущего индекса цвета в localStorage
         */
        function saveCurrentColor() {
            localStorage.setItem(COLOR_STORAGE_KEY, currentColorIndex.toString());
            console.log(`💾 Цвет сохранен в localStorage: ${mysticalColors[currentColorIndex].name}`);
        }
        
        /**
         * Функция для применения цвета к фону и обновления информации
         */
        function applyColor() {
            // Получаем текущий цвет из массива
            const currentColor = mysticalColors[currentColorIndex];
            
            // Применяем цвет к фону body
            document.body.style.backgroundColor = currentColor.hex;
            
            // Обновляем информацию о цвете на странице
            updateColorInfo();
            
            console.log(`🎨 Применен цвет: ${currentColor.name} (${currentColor.hex})`);
        }
        
        /**
         * Функция для обновления информации о цвете на странице
         */
        function updateColorInfo() {
            const currentColor = mysticalColors[currentColorIndex];
            
            // Создаем HTML для отображения информации о цвете
            const colorInfoHTML = `
                <span class="color-indicator" style="background-color: ${currentColor.hex};"></span>
                <span>Текущая атмосфера: <strong>${currentColor.name}</strong></span>
            `;
            
            // Вставляем информацию в контейнер
            colorInfoContainer.innerHTML = colorInfoHTML;
        }
        
        /**
         * Функция для последовательного перехода к следующему цвету
         */
        function changeToNextColor() {
            // Увеличиваем индекс для перехода к следующему цвету
            // Используем оператор остатка от деления для зацикливания
            currentColorIndex = (currentColorIndex + 1) % mysticalColors.length;
            
            // Применяем новый цвет
            applyColor();
            
            // Сохраняем выбранный цвет в localStorage
            saveCurrentColor();
            
            // Получаем название цвета для консоли
            console.log(`✨ Новая атмосфера: ${mysticalColors[currentColorIndex].name}`);
            console.log(`🔄 Текущий индекс: ${currentColorIndex} (всего цветов: ${mysticalColors.length})`);
        }
        
        /**
         * Функция для перехода к предыдущему цвету (опционально)
         */
        function changeToPreviousColor() {
            // Уменьшаем индекс с защитой от отрицательных значений
            currentColorIndex = (currentColorIndex - 1 + mysticalColors.length) % mysticalColors.length;
            
            // Применяем новый цвет
            applyColor();
            
            // Сохраняем выбранный цвет в localStorage
            saveCurrentColor();
        }
        
        // Загружаем сохраненный цвет при загрузке страницы
        loadSavedColor();
        
        // Применяем загруженный (или начальный) цвет
        applyColor();
        
        // Добавляем обработчик события клика на заголовок для последовательного переключения
        titleElement.addEventListener('click', changeToNextColor);
        
        // Добавляем обработчик для клавиш (опционально - для удобства)
        // Стрелка вправо - следующий цвет, стрелка влево - предыдущий
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') {
                changeToNextColor();
                // Добавляем небольшую визуальную подсказку
                console.log('👉 Переключен на следующий цвет');
            } else if (event.key === 'ArrowLeft') {
                changeToPreviousColor();
                console.log('👈 Переключен на предыдущий цвет');
            }
        });
        
        // Добавляем подсказку для пользователя
        console.log('💡 Кликни на заголовок "TarotHub" для последовательного переключения цветов!');
        console.log('💡 Также можно использовать стрелки влево/вправо на клавиатуре');
        console.log(`💡 Текущий цвет (индекс ${currentColorIndex}): ${mysticalColors[currentColorIndex].name}`);
        
        // ================ СЧЕТЧИК ПОСЕЩЕНИЙ ================
        // Реализуем счетчик посещений с сохранением в localStorage
        
        /**
         * Функция для работы со счетчиком посещений
         * Использует localStorage браузера для хранения данных между сессиями
         */
        function updateVisitCounter() {
            // Объявляем переменные для работы со счетчиком
            let visitCount;      // Переменная для хранения количества посещений
            const storageKey = 'tarothub_visit_count';  // Ключ для хранения в localStorage
            const lastVisitKey = 'tarothub_last_visit'; // Ключ для хранения даты последнего визита
            
            // Пытаемся получить сохраненное значение счетчика из localStorage
            const savedCount = localStorage.getItem(storageKey);
            
            // Получаем текущую дату и время для записи последнего визита
            const now = new Date();
            const currentVisitDate = now.toLocaleString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            // Проверяем, есть ли сохраненное значение
            if (savedCount === null) {
                // Если посещение первое (нет данных в localStorage)
                visitCount = 1;  // Устанавливаем счетчик в 1
                console.log('✨ Первое посещение! Счетчик инициализирован');
            } else {
                // Если уже были посещения, преобразуем строку в число и увеличиваем на 1
                visitCount = parseInt(savedCount, 10) + 1;
                console.log(`📊 Предыдущих посещений: ${parseInt(savedCount, 10)}`);
            }
            
            // Сохраняем обновленный счетчик в localStorage
            // Важно: localStorage хранит только строки, поэтому преобразуем число в строку
            localStorage.setItem(storageKey, visitCount.toString());
            
            // Сохраняем дату и время текущего посещения
            localStorage.setItem(lastVisitKey, currentVisitDate);
            
            // Получаем дату последнего посещения (если она была)
            const lastVisit = localStorage.getItem(lastVisitKey);
            
            // Создаем HTML-элемент для отображения счетчика
            // Используем шаблонные строки для удобной вставки значений
            const counterHTML = `
                <div class="visit-counter">
                    <!-- Иконка свечи для атмосферы -->
                    <span>🕯️</span>
                    <!-- Текст счетчика с эмодзи карт Таро -->
                    <span>Раскладов просмотрено:</span>
                    <!-- Само число посещений с специальным классом для стилизации -->
                    <span class="visit-number">${visitCount}</span>
                    <!-- Добавляем информацию о последнем визите, если он был -->
                    ${lastVisit ? `<br><small>🕰️ Последний визит: ${lastVisit}</small>` : ''}
                </div>
            `;
            
            // Находим контейнер для счетчика по его ID
            const counterContainer = document.getElementById('visit-counter-container');
            
            // Вставляем созданный HTML в контейнер
            // innerHTML заменяет содержимое контейнера на наш счетчик
            counterContainer.innerHTML = counterHTML;
            
            // Выводим в консоль информацию о текущем посещении
            console.log(`🔮 Текущее посещение: ${visitCount}`);
            console.log(`📅 Время визита: ${currentVisitDate}`);
            
            // Возвращаем значение счетчика на случай, если понадобится использовать его дальше
            return visitCount;
        }
        
        /**
         * Функция для сброса счетчика посещений (полезно для отладки)
         * Можно вызвать из консоли браузера: resetVisitCounter()
         */
        window.resetVisitCounter = function() {
            // Запрашиваем подтверждение у пользователя
            if (confirm('Сбросить счетчик посещений?')) {
                // Удаляем сохраненные данные из localStorage
                localStorage.removeItem('tarothub_visit_count');
                localStorage.removeItem('tarothub_last_visit');
                // Обновляем счетчик на странице
                updateVisitCounter();
                console.log('🔄 Счетчик посещений сброшен');
            }
        };
        
        // Вызываем функцию обновления счетчика при загрузке страницы
        // Это основной вызов, который запускает всю логику
        const currentCount = updateVisitCounter();
        
        // Простое приветствие
        // Создаем переменную now и присваиваем ей текущую дату и время
        const now = new Date();
        // Извлекаем только часы из текущего времени
        const hours = now.getHours();
        // Объявляем переменную для приветствия (без начального значения)
        let greeting;
        
        // Условная конструкция для выбора приветствия в зависимости от времени суток
        if (hours < 12) greeting = 'Доброе утро';  // Если часы меньше 12 (до полудня)
        else if (hours < 18) greeting = 'Добрый день';  // Если часы от 12 до 18
        else greeting = 'Добрый вечер';  // Если часы 18 и больше
        
        // Выводим в консоль персонализированное приветствие
        console.log(`${greeting}, путешественник!`);
        // Используем шаблонную строку для подстановки значения переменной greeting
        
        // Добавляем небольшое предсказание на основе количества посещений
        const predictions = [
            '🌟 Вас ждет неожиданная встреча',
            '🃏 Сегодня удачный день для новых начинаний',
            '🌙 Прислушайтесь к своей интуиции',
            '⚡ Судьба готовит сюрприз',
            '💫 Звезды благосклонны к вам'
        ];
        
        // Выбираем предсказание на основе счетчика посещений
        const predictionIndex = currentCount % predictions.length;
        console.log(`🔮 Предсказание: ${predictions[predictionIndex]}`);
        
    </script>
