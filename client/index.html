<!DOCTYPE html>
<html>
<head>
    <title>TarotHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Экран приветствия -->
    <div id="welcomeScreen">
        <h1>Добро пожаловать в TarotHub!</h1>
        <p>Здесь будет текст приветствия и истории колоды...</p>
        <button id="start-button">Начать гадание</button>
    </div>

    <div id="main-content">
        <h1>TarotHub</h1>
        <h2>Тренируем интуицию</h2>
        
        <p>Тебе выпала карта: <span id="cardResult">—</span></p>
        <div class="single-card-container">
            <img id="singleCardImage" src="" alt="Одна карта" class="card-image" style="display: none;">
        </div>
        
        <p>Прошлое: <span id="pastDisplay">—</span></p>
        <p>Настоящее: <span id="presentDisplay">—</span></p>
        <p>Будущее: <span id="futureDisplay">—</span></p>

        <div class="three-cards-container">
            <img id="pastImage" src="" alt="Карта прошлого" class="card-image" style="display: none;">
            <img id="presentImage" src="" alt="Карта настоящего" class="card-image" style="display: none;">
            <img id="futureImage" src="" alt="Карта будущего" class="card-image" style="display: none;">
        </div>

        <!-- <img src="../images/0.jpg" alt="Карта Таро" width="200"> -->
        
        <div class="buttons">
            <button onclick="randomCard()">Одна карта</button>
            <button onclick="showThreeCards()">Расклад на три</button>
            <button onclick="resetCards()">Сброс</button>
            <button onclick="clearConsole()">Консоль</button>
            <button onclick="showHeqtLeapSpread()">🔮 Прыжок Хекет (10 карт)</button>
        </div>
    </div>

    <!-- Расклад "Прыжок Хекет" (изначально скрыт) -->
    <div id="heqt-leap-container" style="display: none;">
        <h2>✨ Расклад «Прыжок Хекет» ✨</h2>
        
        <!-- Первая часть (ситуация) -->
        <div class="spread-part">
            <h3>Часть 1: Анализ ситуации</h3>
            <p id="partOneDescription" class="part-description"></p>
            <div class="cards-grid" id="partOneCards">
                <!-- Сюда будут добавляться карты динамически через JS -->
            </div>
        </div>
        
        <!-- Вторая часть (вопрошающий) -->
        <div class="spread-part">
            <h3>Часть 2: Характеристика вопрошающего</h3>
            <p id="partTwoDescription" class="part-description"></p>
            <div class="cards-grid" id="partTwoCards">
                <!-- Сюда будут добавляться карты динамически -->
            </div>
        </div>
        
        <!-- Кнопка возврата в меню -->
        <div class="buttons">
            <button id="back-to-menu" onclick="backToMainMenu()">← Вернуться в меню</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
