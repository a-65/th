<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- ============================================
         МЕТА-ИНФОРМАЦИЯ
         ============================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="TarotHub — мистическое веб-приложение для гадания на картах Таро Гранд Эттейла. Расклад «Прыжок Хекет» с визуализацией карт и толкованиями.">
    <meta name="keywords" content="Таро, Эттейла, Гранд Эттейла, гадание, расклад, Прыжок Хекет, Хекет, карты Таро, мистика">
    <meta name="author" content="TarotHub">
    <title>TarotHub | Мистическое Таро Гранд Эттейла</title>
    
    <!-- ============================================
         ПОДКЛЮЧЕНИЕ ШРИФТОВ И СТИЛЕЙ
         ============================================ -->
    <!-- Playfair Display — элегантный шрифт с засечками для заголовков -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Основные стили приложения -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ============================================
         ОСНОВНОЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ
         Содержит все страницы и навигационные кнопки
         ============================================ -->
    <div id="app">
        
        <!-- ============================================
             СТРАНИЦА 1: ПРИВЕТСТВИЕ
             Отображается по умолчанию (активная страница)
             ============================================ -->
        <div id="page-welcome" class="page active-page">
            <h1>✨ Добро пожаловать в TarotHub ✨</h1>
            <!-- Контент загружается из data.js (INTRO_TEXT) -->
            <div class="page-content" id="welcome-content"></div>
        </div>

        <!-- ============================================
             СТРАНИЦА 2: ИСТОРИЯ КОЛОДЫ
             Содержит исторические сведения о колоде "Таро Гранд Эттейла"
             ============================================ -->
        <div id="page-history" class="page">
            <h1>📜 История колоды «Таро Гранд Эттейла»</h1>
            <!-- scrollable — добавляет прокрутку при превышении максимальной высоты -->
            <div class="page-content scrollable" id="history-content"></div>
        </div>

        <!-- ============================================
             СТРАНИЦА 3: ОПИСАНИЕ РАСКЛАДА
             Содержит правила и описание расклада "Прыжок Хекет"
             ============================================ -->
        <div id="page-rules" class="page">
            <h1>🐸 Описание расклада «Прыжок Хекет»</h1>
            <div class="page-content scrollable" id="rules-content"></div>
        </div>

        <!-- ============================================
            СТРАНИЦА 4: РАСКЛАД (АУТЕНТИЧНАЯ ВЕРСИЯ)
            Содержит аутентичный расклад "Прыжок Хекет" с ручным выбором карт
            ============================================ -->
        <div id="page-spread" class="page">
            <h1>🔮 Расклад «Прыжок Хекет»</h1>
            
            <!-- ====================================
                 БЛОК ВВОДА ВОПРОСА
                 ==================================== -->
            <div id="question-container" class="question-container">
                <label for="question-input" class="question-label">
                    <span class="label-icon">📝</span> О чём вы хотите спросить карты?
                </label>
                <div class="input-wrapper">
                    <textarea 
                        id="question-input" 
                        class="question-input" 
                        rows="3"
                        placeholder="Например: Что меня ждёт в карьере? Как сложатся отношения? Какой урок мне нужно усвоить?"
                    ></textarea>
                    <div class="input-glow"></div>
                    <div class="input-corner corner-tl"></div>
                    <div class="input-corner corner-tr"></div>
                    <div class="input-corner corner-bl"></div>
                    <div class="input-corner corner-br"></div>
                </div>
                <div class="question-buttons">
                    <button id="get-spread-btn" class="get-spread-btn" disabled>
                        <span class="btn-icon">🔮</span> Получить расклад
                    </button>
                </div>
                <div class="question-decoration"></div>
            </div>

            <!-- ====================================
                БЛОК ОТОБРАЖЕНИЯ ВОПРОСА (изначально скрыт)
                ==================================== -->
            <div id="question-display" class="question-display hidden">
                <p>📝 <strong>Ваш вопрос:</strong> <span id="displayed-question"></span></p>
            </div>

            <!-- ====================================
                ОБЛАСТЬ РАСКЛАДА (СКРЫТА ДО ВВОДА ВОПРОСА)
                ==================================== -->
            <div id="spread-area" class="hidden">
                
                <!-- Основная область расклада: позиции (слева) + колода (справа) -->
                <div class="spread-layout">
                    
                    <!-- ЛЕВАЯ ЧАСТЬ: позиции расклада (сетка карт) -->
                    <div class="spread-positions">
                        <div id="spread-container">
                            
                            <!-- Первая часть (ситуация) -->
                            <div class="spread-part">
                                <h3>Часть 1: Анализ ситуации</h3>
                                <p id="partOneDescription" class="part-description"></p>
                                <div class="cards-grid" id="part1-grid"></div>
                            </div>
                            
                            <!-- Вторая часть (вопрошающий) -->
                            <div class="spread-part">
                                <h3>Часть 2: Характеристика вопрошающего</h3>
                                <p id="partTwoDescription" class="part-description"></p>
                                <div class="cards-grid" id="part2-grid"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- ПРАВАЯ ЧАСТЬ: КОЛОДА ДЛЯ ВЫБОРА -->
                    <div class="deck-area">
                        <!-- Контейнер для колоды (будет заполняться динамически через deck.js) -->
                        <div id="deck-container" class="deck-container">
                            <!-- Содержимое будет динамически создано deck.js -->
                        </div>
                    </div>
                    
                </div>
                
            </div> <!-- Конец spread-area -->

            <!-- ====================================
                БЛОК УПРАВЛЕНИЯ (появляется после завершения расклада)
                ==================================== -->
            <div id="spread-controls" class="spread-controls hidden">
                <button id="new-question-btn" class="control-btn">
                    ✏️ Новый вопрос
                </button>
            </div>
            
        </div> <!-- Конец page-spread -->

        <!-- ============================================
             НАВИГАЦИЯ
             Контейнер для навигационных кнопок между страницами
             Кнопки создаются динамически через createNavButtons()
             ============================================ -->
        <div id="nav-buttons" class="nav-buttons"></div>
        
    </div> <!-- Конец контейнера #app -->

    <!-- ============================================
         ПОДКЛЮЧЕНИЕ СКРИПТОВ
         Порядок важен: сначала данные, потом модули, потом логика
         ============================================ -->
    <!-- Массив карт Таро (78 карт) -->
    <script src="js/data/tarotDeck.js"></script>
    <!-- Текстовые данные (INTRO_TEXT, HISTORY_TEXT, HEQET_TEXT и др.) -->
    <script src="js/data.js"></script>
    <!-- Вспомогательные функции (withLock, getActivePageId) -->
    <script src="js/modules/utils.js"></script>
    <!-- Управление навигацией между страницами -->
    <script src="js/modules/navigation.js"></script>
    <!-- Логика расклада (старая, временно сохранена для совместимости) -->
    <script src="js/modules/spread.js"></script>
    <!-- Логика вопроса (ввод, сохранение, восстановление) -->
    <script src="js/modules/question.js"></script>
    <!-- Логика аутентичного расклада (колоды, выбор карт, тасовка) -->
    <script src="js/modules/deck.js"></script>
    <!-- Точка входа приложения -->
    <script src="js/main.js"></script>
</body>
</html>
