<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Карта Дня | TarotHub</title>
    <style>
        /* Это пока пропускаем, просто чтобы было красиво */
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #1a0f1e 0%, #2d1a2b 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0e6d2;
        }
        .ritual-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 32px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e9c9a0;
            text-shadow: 0 0 10px rgba(233, 201, 160, 0.5);
        }
        .subtitle {
            font-style: italic;
            opacity: 0.7;
            margin-bottom: 2rem;
            border-bottom: 1px dashed #b8860b;
            padding-bottom: 1rem;
        }
        .card-area {
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0;
            padding: 1.5rem;
            background: rgba(10, 5, 8, 0.6);
            border-radius: 24px;
            border: 2px solid #4a2e2e;
            transition: all 0.3s ease;
        }
        .card-image {
            width: 150px;
            height: 250px;
            background: #2c1e1e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid #b8860b;
            transition: transform 0.5s ease;
        }
        .card-image:hover {
            transform: scale(1.02) rotate(0.5deg);
        }
        .card-name {
            margin-top: 1.2rem;
            font-size: 1.6rem;
            font-weight: 400;
            color: #d4af37;
            min-height: 3rem;
        }
        .card-description {
            font-size: 1rem;
            margin-top: 0.8rem;
            padding: 0.5rem 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            font-style: italic;
            color: #c0b0a0;
            max-width: 90%;
        }
        .system-status {
            font-size: 0.8rem;
            margin-top: 1rem;
            color: #7a5a4a;
            font-style: italic;
            min-height: 1.2rem;
        }

        button {
            background: linear-gradient(45deg, #3a2828, #2e1b1b);
            border: 2px solid #b8860b;
            color: #e9c9a0;
            font-size: 1.3rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #3d2a1e;
            transition: all 0.1s ease;
            margin-top: 1rem;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #3d2a1e;
        }
        .energy {
            font-size: 0.9rem;
            margin-top: 2rem;
            color: #7a5a4a;
        }
    </style>
</head>
<body>
    <div class="ritual-container">
        <h1>🔮 TarotHub</h1>
        <div class="subtitle">карта дня</div>
        
        <!-- Здесь будет появляться карта -->
        <div class="card-area" id="cardArea">
            <div class="card-image" id="cardImage">
                🎴
            </div>
            <div class="card-name" id="cardName">
                Нажми на кнопку
            </div>
            <div class="card-description" id="cardDescription"></div>
            <div class="system-status" id="systemStatus"></div>
        </div>

        <!-- Кнопка-заклинание -->
        <button id="drawButton">
            ✨ Вытянуть карту ✨
        </button>
        
        <div class="energy">
            * Энергия дня готова измениться *
        </div>
        
    </div>

    <script>
        // Константа с адресом нашего API
        const API_URL = 'http://localhost:8080/api';

        // Получаем элементы со страницы
        const cardImageEl = document.getElementById('cardImage');
        const cardNameEl = document.getElementById('cardName');
        const cardDescEl = document.getElementById('cardDescription');
        const drawButton = document.getElementById('drawButton');

        // Асинхронная функция для получения карты с сервера
        async function fetchCardFromServer() {
            try {
                // Показываем, что идёт загрузка
                cardImageEl.textContent = '⏳';
                cardNameEl.textContent = 'Тянем карту...';
                cardDescEl.textContent = 'Слушаем голос Архивариуса';

                // Делаем запрос к нашему Go-серверу
                const response = await fetch(`${API_URL}/card`);
                
                // Превращаем ответ в JSON
                const card = await response.json();
                
                // Обновляем страницу полученными данными
                cardImageEl.textContent = card.symbol;
                cardNameEl.textContent = card.name;
                cardDescEl.textContent = card.description;
                
                // Магия в консоли
                console.log(`✨ Архивариус выдал: ${card.name} — ${card.description}`);
            } catch (error) {
                // Если что-то пошло не так
                console.error('Ошибка связи с Архивариусом:', error);
                cardImageEl.textContent = '❌';
                cardNameEl.textContent = 'Ошибка';
                cardDescEl.textContent = 'Не удалось связаться с сервером';
            }
        }

        // Флаг, который запоминает, был ли сервер недоступен
        let wasServerDown = false

        // Проверяем здоровье сервера каждые 5 секунд
        setInterval(async () => {
            try {
                const response = await fetch(`${API_URL}/card`);
                if (response.ok) {
                    // Если сервер был упавшим, а теперь поднялся
                    if (wasServerDown) {
                        showStatus('✨ Архивариус вернулся!');
                        console.log('✨ Архивариус вернулся! Обновляю карту...');
                        fetchCardFromServer();
                        wasServerDown = false; // Сбрасываем флаг
                    }
                } else {
                    // Сервер ответил, но с ошибкой (например 500)
                    wasServerDown = true;
                }
            } catch (e) {
                // Сервер недоступен (сеть, остановлен и т.д.)
                if (!wasServerDown) {
                    showStatus('🔴 Архивариус недоступен...', false);
                    console.log('🔴 Архивариус недоступен...');
                    wasServerDown = true
                }
            }
        }, 5000);

        // Вешаем обработчик на кнопку
        drawButton.addEventListener('click', fetchCardFromServer);

        // Сразу тянем карту при загрузке страницы
        fetchCardFromServer();

        // Для красоты: добавим эффект при наведении
        cardImageEl.addEventListener('mouseenter', () => {
            cardImageEl.style.transform = 'scale(1.02) rotate(1deg)';
        });
        cardImageEl.addEventListener('mouseleave', () => {
            cardImageEl.style.transform = 'scale(1) rotate(0deg)';
        });
        function showStatus(message, isGood = true) {
            const statusEl = document.getElementById('systemStatus');
            if (statusEl) {
                statusEl.textContent = message;
                statusEl.style.color = isGood ? '#7a5a4a' : '#b84a4a';
            }
        }
    </script>
</body>
</html>
