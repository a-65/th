<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- ============================================
         МЕТА-ИНФОРМАЦИЯ
         ============================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="TarotHub — мистическое веб-приложение для гадания на картах Таро Гранд Эттейла. Расклад «Прыжок Хекет» с визуализацией карт и толкованиями.">
    <meta name="keywords" content="Таро, Эттейла, Гранд Эттейла, гадание, расклад, Прыжок Хекет, Хекет, карты Таро, мистика">
    <meta name="author" content="TarotHub">
    <title>TarotHub | Мистическое Таро Гранд Эттейла</title>
    
    <!-- ============================================
         ПОДКЛЮЧЕНИЕ ШРИФТОВ И СТИЛЕЙ
         ============================================ -->
    <!-- Playfair Display — элегантный шрифт с засечками для заголовков -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Основные стили приложения -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ============================================
         ОСНОВНОЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ
         Содержит все страницы и навигационные кнопки
         ============================================ -->
    <div id="app">
        
        <!-- ============================================
             СТРАНИЦА 1: ПРИВЕТСТВИЕ
             Отображается по умолчанию (активная страница)
             ============================================ -->
        <div id="page-welcome" class="page active-page">
            <h1>✨ Добро пожаловать в TarotHub ✨</h1>
            <!-- Контент загружается из data.js (INTRO_TEXT) -->
            <div class="page-content" id="welcome-content"></div>
        </div>

        <!-- ============================================
             СТРАНИЦА 2: ИСТОРИЯ КОЛОДЫ
             Содержит исторические сведения о колоде "Таро Гранд Эттейла"
             ============================================ -->
        <div id="page-history" class="page">
            <h1>📜 История колоды «Таро Гранд Эттейла»</h1>
            <!-- scrollable — добавляет прокрутку при превышении максимальной высоты -->
            <div class="page-content scrollable" id="history-content"></div>
        </div>

        <!-- ============================================
             СТРАНИЦА 3: ОПИСАНИЕ РАСКЛАДА
             Содержит правила и описание расклада "Прыжок Хекет"
             ============================================ -->
        <div id="page-rules" class="page">
            <h1>🐸 Описание расклада «Прыжок Хекет»</h1>
            <div class="page-content scrollable" id="rules-content"></div>
        </div>

        <!-- ============================================
             СТРАНИЦА 4: РАСКЛАД
             Содержит сам расклад "Прыжок Хекет" (10 карт) и кнопку для нового расклада
             ============================================ -->
        <div id="page-spread" class="page">
            <h1>🔮 Расклад «Прыжок Хекет»</h1>
            
            <!-- Контейнер для расклада — обе части: ситуация и вопрошающий -->
            <div id="spread-container">
                
                <!-- ====================================
                     ЧАСТЬ 1: АНАЛИЗ СИТУАЦИИ
                     Анализирует ситуацию в контексте вопроса, выявляет причины и последствия
                     ==================================== -->
                <div class="spread-part">
                    <h3>Часть 1: Анализ ситуации</h3>
                    <!-- Описание первой части — загружается из PART_ONE_DESCRIPTION -->
                    <p id="partOneDescription" class="part-description"></p>
                    <!-- Сетка для 5 карт Старших Арканов (ID 0-21) -->
                    <!-- Карты добавляются динамически через displayCards() -->
                    <div class="cards-grid" id="partOneCards"></div>
                </div>
                
                <!-- ====================================
                     ЧАСТЬ 2: ХАРАКТЕРИСТИКА ВОПРОШАЮЩЕГО
                     Характеризует вопрошающего: эмоции, мысли, сильные и слабые стороны
                     ==================================== -->
                <div class="spread-part">
                    <h3>Часть 2: Характеристика вопрошающего</h3>
                    <!-- Описание второй части — загружается из PART_TWO_DESCRIPTION -->
                    <p id="partTwoDescription" class="part-description"></p>
                    <!-- Сетка для 5 карт Средних и Младших Арканов (ID 22-77) -->
                    <!-- Карты добавляются динамически через displayCards() -->
                    <div class="cards-grid" id="partTwoCards"></div>
                </div>
            </div>
            
            <!-- Кнопка для нового расклада -->
            <!-- При нажатии генерирует новый набор карт, не выходя из страницы расклада -->
            <div class="new-spread-button-container">
                <button id="new-spread-btn" class="new-spread-btn">
                    🔄 Новый расклад «Прыжок Хекет»
                </button>
            </div>
        </div>

        <!-- ============================================
             НАВИГАЦИЯ
             Контейнер для навигационных кнопок между страницами
             Кнопки создаются динамически через createNavButtons()
             ============================================ -->
        <div id="nav-buttons" class="nav-buttons"></div>
        
    </div> <!-- Конец контейнера #app -->

    <!-- ============================================
         ПОДКЛЮЧЕНИЕ СКРИПТОВ
         Порядок важен: сначала данные, потом логика
         ============================================ -->
    <!-- data.js — текстовые данные (INTRO_TEXT, HISTORY_TEXT, HEQET_TEXT, PART_ONE_POSITIONS и др.) -->
    <script src="js/data.js"></script>
    <!-- app.js — основная логика приложения (навигация, генерация карт, отображение) -->
    <script src="js/app.js"></script>
</body>
</html>
